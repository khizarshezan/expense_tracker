<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1e293b; border-bottom: 1px solid #334155; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .form-control, .form-select { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; }
        .form-control:focus, .form-select:focus { background: #0f172a; color: #e2e8f0; border-color: #3b82f6; box-shadow: none; }
        .btn-success { background: #10b981; border: none; }
        .btn-danger { background: #ef4444; border: none; padding: 2px 8px; font-size: 0.8rem; }
        .balance-positive { color: #10b981; }
        .balance-negative { color: #ef4444; }
        .income-badge { background: #064e3b; color: #10b981; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; }
        .expense-badge { background: #450a0a; color: #ef4444; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; }
        .stat-card { text-align: center; padding: 20px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; }
        .transaction-item { border-bottom: 1px solid #334155; padding: 12px 0; }
        .transaction-item:last-child { border-bottom: none; }
        h5, h6 { color: #ffffff; }
        .text-muted { color: #94a3b8 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand fw-bold fs-4">Smart Expense Tracker</span>
        <span class="text-muted">Built by Khizar Shezan</span>
    </nav>

    <div class="container-fluid py-4 px-4">
        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="text-muted mb-1">Total Income</div>
                    <div class="stat-value balance-positive" id="totalIncome">0.00</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="text-muted mb-1">Total Expenses</div>
                    <div class="stat-value balance-negative" id="totalExpense">0.00</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="text-muted mb-1">Balance</div>
                    <div class="stat-value" id="balance">0.00</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Add Transaction Form -->
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="mb-3">Add Transaction</h5>
                    <div class="mb-3">
                        <input type="text" id="title" class="form-control" placeholder="Title (e.g. Lunch, Salary)">
                    </div>
                    <div class="mb-3">
                        <input type="number" id="amount" class="form-control" placeholder="Amount">
                    </div>
                    <div class="mb-3">
                        <select id="category" class="form-select">
                            {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <select id="type" class="form-select">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <input type="date" id="date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <textarea id="note" class="form-control" rows="2" placeholder="Note (optional)"></textarea>
                    </div>
                    <button class="btn btn-success w-100" onclick="addTransaction()">Add Transaction</button>
                </div>

                <!-- Category Chart -->
                <div class="card p-4 mt-4">
                    <h5 class="mb-3">Spending by Category</h5>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Transactions List -->
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="mb-3">Recent Transactions</h5>
                    <div id="transactionsList"></div>
                </div>
            </div>

            <!-- Monthly Chart -->
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="mb-3">Monthly Overview</h5>
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let categoryChart, monthlyChart;

        document.getElementById('date').valueAsDate = new Date();

        async function loadData() {
            const [transactions, summary] = await Promise.all([
                fetch('/api/transactions').then(r => r.json()),
                fetch('/api/summary').then(r => r.json())
            ]);

            document.getElementById('totalIncome').textContent = summary.total_income?.toFixed(2) || '0.00';
            document.getElementById('totalExpense').textContent = summary.total_expense?.toFixed(2) || '0.00';
            const balance = (summary.balance || 0);
            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = balance.toFixed(2);
            balanceEl.className = 'stat-value ' + (balance >= 0 ? 'balance-positive' : 'balance-negative');

            const list = document.getElementById('transactionsList');
            list.innerHTML = transactions.map(t => `
                <div class="transaction-item d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-semibold">${t.title}</div>
                        <small class="text-muted">${t.category} • ${t.date}</small>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="${t.type === 'income' ? 'income-badge' : 'expense-badge'}">
                            ${t.type === 'income' ? '+' : '-'}${t.amount}
                        </span>
                        <button class="btn btn-danger" onclick="deleteTransaction(${t.id})">X</button>
                    </div>
                </div>
            `).join('') || '<p class="text-muted text-center">No transactions yet</p>';

            updateCategoryChart(summary.by_category || []);
            updateMonthlyChart(summary.monthly || []);
        }

        function updateCategoryChart(data) {
            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.category),
                    datasets: [{ data: data.map(d => d.total), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'] }]
                },
                options: { plugins: { legend: { labels: { color: '#e2e8f0' } } } }
            });
        }

        function updateMonthlyChart(data) {
            if (monthlyChart) monthlyChart.destroy();
            monthlyChart = new Chart(document.getElementById('monthlyChart'), {
                type: 'bar',
                data: {
                    labels: data.map(d => d.month),
                    datasets: [
                        { label: 'Income', data: data.map(d => d.income), backgroundColor: '#10b981' },
                        { label: 'Expense', data: data.map(d => d.expense), backgroundColor: '#ef4444' }
                    ]
                },
                options: { plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
            });
        }

        async function addTransaction() {
            const data = {
                title: document.getElementById('title').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                type: document.getElementById('type').value,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value
            };
            if (!data.title || !data.amount || !data.date) { alert('Please fill all required fields'); return; }
            await fetch('/api/transactions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            document.getElementById('title').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            loadData();
        }

        async function deleteTransaction(id) {
            await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
            loadData();
        }

        loadData();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
